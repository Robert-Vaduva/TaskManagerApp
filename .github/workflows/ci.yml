name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx # Ne asigurăm că avem tool-urile de testare

    - name: Run Syntax Check
      run: |
        cd backend
        python -m compileall .

    - name: Run Tests with Pytest
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5433/test_db
        SECRET_KEY: secret_pentru_teste
        ALGORITHM: HS256
      run: |
        cd backend
        python -m pytest